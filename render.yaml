services:
  - type: web
    name: campushire-backend
    runtime: python
    region: oregon           # change to your preferred region
    plan: free               # upgrade to starter for always-on

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health  # matches the /health endpoint in main.py

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false          # set in Render dashboard: https://campushire.vercel.app
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure value
      # Add any other env vars your app needs (GEMINI_API_KEY etc.)
